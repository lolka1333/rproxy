# ═══════════════════════════════════════════════════════════════════════════
#  rproxy — configuration
#
#  Auto-created and loaded on first run. Edit it and restart — this file is the
#  only place settings live (the command line just locates it: --dir / --config).
#
#    • one setting per line
#    • "#" starts a comment (whole-line, or trailing after a space); blanks ignored
#
#  The values below are the built-in defaults — edit to taste.
# ═══════════════════════════════════════════════════════════════════════════


# ── Network ──────────────────────────────────────────────────────────────────

# Address to listen on. Use 0.0.0.0 so other devices can reach it, then point
# the phone's Global HTTP Proxy at  <this-host-ip>:20487.
listen = 0.0.0.0:20487


# ── Logging ──────────────────────────────────────────────────────────────────

verbose = false        # include the Host header on HTTP log lines
json    = false        # emit JSON Lines instead of human-readable text

# Append every log line to a file too (stdout is always used):
# log = proxy.log


# ── Timeouts & limits ────────────────────────────────────────────────────────

connect-timeout = 10     # seconds to establish the upstream connection
head-timeout    = 30     # seconds to read a full request head
idle-timeout    = 300    # seconds of silence before a relay is reclaimed (0 = off)
max-conns       = 1024   # maximum simultaneous client connections


# ── Soft-block ───────────────────────────────────────────────────────────────
#
#  A blocked destination is NOT failed outright: the proxy connects and relays
#  up to `block-cap` bytes, then drops the connection — so the page loads
#  partially and breaks. Matching is subdomain-aware and case-insensitive
#  (example.com also blocks www.example.com).
#
#  Turn blocking on/off with the switch below — the list stays configured either
#  way, so you can toggle it without deleting anything.

blocking = off           # ← set to `on` to enable the block list below

block-cap = 13312        # bytes a blocked site may load before the drop

# Domains to block. `blocklist` names a one-domain-per-line file; repeat the line
# to load several lists — they're all merged (duplicates collapse). `block =`
# adds single domains inline (also repeatable). The shipped blocked.txt is a
# starter ad/tracker list.
blocklist = blocked.txt
# blocklist = blocked_music.txt
# blocklist = blocked_ads.txt
# block = ads.example.com
# block = tracker.example.net
